<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/UI/css/contacts-window.css">
    <style>

        html,
        body {
            height: 100vh;
            width: 100vw;
            margin: 0;
        }

        body {
            background-color: black;
            padding: 10px;
            display: flex;
            gap: 10px;
            box-sizing: border-box;
        }

        p {
            font-family: Arial;
        }

        .chat-window {
            background-color: lightblue;
            flex: 1;
            height: 100%;
            border-radius: 10px;
        }
        
    </style>
</head>

<body>
    <div class="contacts-window">
        <div class="top-contact-bar">
            <input type="search" class="contact-search-bar">
        </div>
        <div class="contacts">
            <div class="contact">
                <div class="contact-picture-cont">
                    <img src="/UI/imgs/kreise.pdf" class="contact-picture">
                </div>
                <div class="contact-info">
                    <p class="contact-heading">Kontakt 1</p>
                    <p class="contact-number"> Number: 1234567890</p>
                    <p class="contact-name"> Name: Max Mustermann</p>
                </div>
            </div>
            <div class="contact">
                <div class="contact-picture-cont">
                    <img src="/UI/imgs/kreise.pdf" class="contact-picture">
                </div>
                <div class="contact-info">
                    <p class="contact-heading">Kontakt 2</p>
                    <p class="contact-number"> Number: 1234567890</p>
                    <p class="contact-name"> Name: Max Mustermann</p>
                </div>
            </div>
            <div class="add-contact-button-cont">
                <button class="add-contact-button">+</button>
            </div>
        </div>
    </div>
    <div class="chat-window"></div>
</body>

</html>
