<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="/UI/css/contacts-window.css" />
        <style>
            html,
            body {
                height: 100vh;
                width: 100vw;
                margin: 0;
            }

            body {
                background-color: black;
                padding: 10px;
                display: flex;
                gap: 10px;
                box-sizing: border-box;
            }

            p {
                font-family: Arial;
            }

            .chat-window {
                background-color: lightblue;
                flex: 1;
                height: 100%;
                border-radius: 10px;
            }
        </style>
    </head>

    <body>
        <div class="contacts-window">
            <div class="top-contact-bar">
                <input type="search" class="contact-search-bar" />
            </div>
            <div class="contacts"></div>
        </div>
        <div class="chat-window"></div>
        <script src="/UI/js/app.js"></script>
    </body>
</html>
